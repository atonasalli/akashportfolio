<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio - Akash Tonasalli</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
  position: absolute;
  width: 100%;
  z-index: 10;
  background: rgba(0,0,0,0.5);
}

/* Video Section */
.video-section {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
}

/* Dark overlay */
.video-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 1;
}

/* Text overlay */
.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  text-align: center;
  z-index: 2;
}

/* Heading animation */
.overlay h1 {
  font-size: 50px;
  font-weight: bold;
  animation: slideUp 1.5s ease;
}

/* Typing effect */
.typing {
  font-size: 22px;
  border-right: 3px solid #fff;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
}

/* Animations */
@keyframes slideUp {
  from {opacity: 0; transform: translate(-50%, 20%);}
  to {opacity: 1; transform: translate(-50%, -50%);}
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Akash Tonasalli</a>
    
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Skills</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Video Section -->
<div class="video-section">

  <div class="video-overlay"></div>

  <!-- Video -->
  <video id="bgVideo" muted autoplay playsinline></video>

  <!-- Text -->
  <div class="overlay">
    <h1>Hi, I'm Akash 👋</h1>
    <p class="typing" id="typingText"></p>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* VIDEO LIST */
const videos = [
  "https://www.w3schools.com/howto/rain.mp4",
  "https://www.w3schools.com/howto/forest.mp4",
  "https://www.w3schools.com/howto/mountain.mp4"
];

let index = 0;
const video = document.getElementById("bgVideo");

/* Function to safely play video */
function playVideo(i) {
  video.src = videos[i];
  video.load();

  video.play().catch(() => {
    console.log("Autoplay blocked");
  });
}

/* Start first video */
playVideo(index);

/* When video ends → play next instantly */
video.addEventListener("ended", () => {
  index = (index + 1) % videos.length;
  playVideo(index);
});

/* If paused unexpectedly → resume */
video.addEventListener("pause", () => {
  video.play();
});

/* If error → skip to next */
video.addEventListener("error", () => {
  index = (index + 1) % videos.length;
  playVideo(index);
});


/* TYPING EFFECT */
const texts = [
  "Digital Marketer 🚀",
  "Web Developer 💻",
  "SEO Expert 🔍"
];

let textIndex = 0;
const typingElement = document.getElementById("typingText");

function typeEffect() {
  typingElement.style.animation = "none";
  typingElement.style.width = "0";
  void typingElement.offsetWidth;

  typingElement.textContent = texts[textIndex];

  typingElement.style.animation =
    "typing 3.5s steps(30,end) forwards, blink 0.7s infinite";

  textIndex = (textIndex + 1) % texts.length;
}

/* Loop typing */
setInterval(typeEffect, 4000);

/* Start typing */
typeEffect();

</script>

</body>
</html>
